<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Заметки" />
  <link rel="icon" href="icons/favicon-32x32.png" type="image/png" />
  <title>Заметки (13-18)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 Мои заметки</h1>
      <span id="status-badge" class="badge badge--online">Онлайн</span>
    </header>

    <nav class="filter-bar">
      <button id="home-btn" class="filter-btn active">Главная</button>
      <button id="about-btn" class="filter-btn">О приложении</button>
    </nav>

    <main id="app-content" style="padding:1rem;">
      <!-- Сюда загружается динамический контент -->
    </main>

    <footer style="padding:1rem; text-align:center; border-top:1px solid #e0ddd5;">
      <button id="enable-push"
        style="padding:8px 16px; background:#16a34a; color:white; border:none; border-radius:6px; cursor:pointer;">
        Включить уведомления
      </button>
      <button id="disable-push"
        style="display:none; padding:8px 16px; background:#dc2626; color:white; border:none; border-radius:6px; cursor:pointer;">
        Отключить уведомления
      </button>
    </footer>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
